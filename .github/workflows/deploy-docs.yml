# GitHub Actions workflow to deploy MkDocs documentation to GitHub Pages
# Triggered on push to master/main branches or manual dispatch

name: Deploy Documentation

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs-public.yml'
      - 'requirements-docs.txt'
      - 'resources/openapi/**'
      - 'swagger-config.yaml'
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Generate OpenAPI spec (reuses the existing generate-openapi workflow)
  generate-spec:
    uses: ./.github/workflows/generate-openapi.yaml
    permissions:
      contents: read

  # Build job
  build:
    needs: generate-spec
    runs-on: ${{ vars.RUNNER }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-specs
          path: docs/assets/openapi/

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-docs.txt'

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build documentation
        run: python -m mkdocs build --strict # Fail on warnings (broken links, missing refs) to enforce documentation quality

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ${{ vars.RUNNER }}
    permissions:
      pages: write
      id-token: write
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5